<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Feishu Fixture</title>
  </head>
  <body>
    <div class="chat-area">
      <!-- Message list -->
      <div class="messages" role="list">
        <div class="message-bubble is-out">Existing message</div>
      </div>
      <!-- Editor area -->
      <div class="message-input">
        <div
          contenteditable="true"
          role="textbox"
          aria-label="Message"
        >
          <br />
        </div>
      </div>
      <!-- Send button -->
      <button aria-label="Send message">Send</button>
    </div>
  </body>
</html>
