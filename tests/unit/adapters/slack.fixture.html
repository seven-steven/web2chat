<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Slack Fixture</title>
  </head>
  <body>
    <div id="client_XXXX">
      <div class="p-workspace">
        <div class="p-message_pane" role="main">
          <div class="c-message_list" role="list">
            <div class="c-message" data-testid="message-bubble">
              <span>Existing message</span>
            </div>
          </div>
        </div>
        <div id="msg_input">
          <div
            class="ql-editor"
            role="textbox"
            contenteditable="true"
            aria-label="Message #general"
          >
            <p><br /></p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
