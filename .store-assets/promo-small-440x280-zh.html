<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=440" />
    <title>小宣传图块 — 440×280（中文）</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        width: 440px;
        height: 280px;
        background: #0f0f0f;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          sans-serif;
        overflow: hidden;
        position: relative;
      }
      .bg-ring {
        position: absolute;
        width: 400px;
        height: 400px;
        border-radius: 50%;
        border: 1px solid rgba(16, 185, 129, 0.06);
        top: -160px;
        left: -80px;
      }
      .bg-ring:nth-child(2) {
        width: 300px;
        height: 300px;
        top: auto;
        left: auto;
        bottom: -120px;
        right: -60px;
        border-color: rgba(16, 185, 129, 0.04);
      }
      .glow {
        position: absolute;
        width: 200px;
        height: 200px;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.15;
        pointer-events: none;
        background: #10b981;
        top: -60px;
        right: -40px;
      }
      .content {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        text-align: center;
        padding: 24px;
      }
      .logo-row {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .logo-row svg {
        width: 32px;
        height: 32px;
      }
      .logo-text {
        font-size: 22px;
        font-weight: 700;
        color: #e7e7e7;
        letter-spacing: -0.02em;
      }
      .headline {
        font-size: 14px;
        color: #a8a8a8;
        line-height: 1.5;
        max-width: 340px;
      }
      .headline strong {
        color: #34d399;
        font-weight: 600;
      }
      .platforms {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-top: 4px;
      }
      .platform-pill {
        display: flex;
        align-items: center;
        gap: 5px;
        padding: 4px 10px;
        border-radius: 12px;
        font-size: 11px;
        font-weight: 500;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.06);
        color: #a8a8a8;
      }
      .platform-pill svg {
        width: 14px;
        height: 14px;
      }
      .platform-pill.discord svg {
        fill: #5865f2;
      }
      .platform-pill.openclaw {
        color: #34d399;
        border-color: rgba(16, 185, 129, 0.2);
      }
      .arrow-flow {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        color: #52525b;
        margin-top: 2px;
      }
      .arrow-flow .step {
        color: #71717a;
      }
      .arrow-flow .sep {
        color: #34d399;
      }
    </style>
  </head>
  <body>
    <div class="bg-ring"></div>
    <div class="bg-ring"></div>
    <div class="glow"></div>

    <div class="content">
      <div class="logo-row">
        <svg viewBox="0 0 256 256" fill="none" stroke="#10b981" stroke-width="12">
          <rect x="32" y="48" width="192" height="160" rx="16" />
          <path d="M32 92 H224" />
          <path d="M128 92 V208" />
          <g stroke-width="8">
            <path d="M60 128 H108" />
            <path d="M60 152 H108" />
            <path d="M148 128 H196" />
            <path d="M148 152 H196" />
          </g>
          <circle cx="56" cy="70" r="5" fill="#10b981" stroke="none" />
          <circle cx="78" cy="70" r="5" fill="#10b981" stroke="none" />
          <circle cx="100" cy="70" r="5" fill="#10b981" stroke="none" />
        </svg>
        <span class="logo-text">web2chat</span>
      </div>

      <div class="headline">
        <strong>一键</strong>抓取网页并投递结构化内容到 IM 或 AI Agent 聊天
      </div>

      <div class="platforms">
        <div class="platform-pill discord">
          <svg viewBox="0 0 24 24">
            <path
              d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128c.12-.098.246-.198.373-.292a.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"
            />
          </svg>
          Discord
        </div>
        <div class="platform-pill openclaw">
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M12 2L2 7l10 5 10-5-10-5z" />
            <path d="M2 17l10 5 10-5" />
            <path d="M2 12l10 5 10-5" />
          </svg>
          OpenClaw
        </div>
      </div>

      <div class="arrow-flow">
        <span class="step">抓取</span>
        <span class="sep">→</span>
        <span class="step">撰写</span>
        <span class="sep">→</span>
        <span class="step">投递</span>
      </div>
    </div>
  </body>
</html>
