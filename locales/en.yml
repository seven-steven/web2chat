extension_name:
  message: 'Web2Chat'

extension_description:
  message: 'One-click clip-and-send to your favorite IM or AI agent chat.'

action_default_title:
  message: 'Web2Chat — clip current page'

popup_hello:
  message: 'Hello, world (×$COUNT$)'
  placeholders:
    count:
      content: '$1'
      example: '5'

capture_loading_label:
  message: 'Capturing page…'

capture_field_title:
  message: 'Title'

capture_field_url:
  message: 'Source URL'

capture_field_description:
  message: 'Description'

capture_field_createAt:
  message: 'Captured at'

capture_field_content:
  message: 'Content'

capture_empty_restricted_heading:
  message: "Can't capture this page"

capture_empty_restricted_body_before:
  message: "Web2Chat doesn't run on browser-internal pages. Open a regular website, then click "

