extension_name:
  message: 'Web2Chat'

extension_description:
  message: 'One-click clip-and-send to your favorite IM or AI agent chat.'

action_default_title:
  message: 'Web2Chat — clip current page'

popup_hello:
  message: 'Hello, world (×$COUNT$)'
  placeholders:
    count:
      content: '$1'
      example: '5'

capture.loading.label:
  message: 'Capturing page…'

capture.field.title:
  message: 'Title'

capture.field.url:
  message: 'Source URL'

capture.field.description:
  message: 'Description'

capture.field.createAt:
  message: 'Captured at'

capture.field.content:
  message: 'Content'

capture.empty.restricted.heading:
  message: "Can't capture this page"

capture.empty.restricted.body.before:
  message: "Web2Chat doesn't run on browser-internal pages. Open a regular website, then click "

capture.empty.restricted.body.icon:
  message: 'the toolbar icon'

capture.empty.restricted.body.after:
  message: ' again.'

capture.empty.noContent.heading:
  message: 'Nothing to extract'

capture.empty.noContent.body.before:
  message: "This page doesn't have a recognizable article body. Try a different page, then click "

capture.empty.noContent.body.icon:
  message: 'the toolbar icon'

capture.empty.noContent.body.after:
  message: ' again.'

capture.error.scriptFailed.heading:
  message: 'Capture failed'

capture.error.scriptFailed.body.before:
  message: 'Something went wrong while reading this page. Click '

capture.error.scriptFailed.body.icon:
  message: 'the toolbar icon'

capture.error.scriptFailed.body.after:
  message: ' to try again.'
