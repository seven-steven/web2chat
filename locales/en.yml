  message: ' again.'

capture_empty_noContent_heading:
  message: 'Nothing to extract'

capture_empty_noContent_body_before:
  message: "This page doesn't have a recognizable article body. Try a different page, then click "

capture_empty_noContent_body_icon:
  message: 'the toolbar icon'

capture_empty_noContent_body_after:
  message: ' again.'

capture_error_scriptFailed_heading:
  message: 'Capture failed'

capture_error_scriptFailed_body_before:
  message: 'Something went wrong while reading this page. Click '

