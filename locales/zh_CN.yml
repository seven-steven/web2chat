extension_name:
  message: 'Web2Chat'

extension_description:
  message: '一键把当前网页投递到 IM 或 AI Agent 聊天会话'

action_default_title:
  message: 'Web2Chat — 投递当前页面'

popup_hello:
  message: '你好，世界 ×$COUNT$'
  placeholders:
    count:
      content: '$1'
      example: '5'

capture.loading.label:
  message: '正在抓取页面…'

capture.field.title:
  message: '标题'

capture.field.url:
  message: '来源链接'

capture.field.description:
  message: '摘要'

capture.field.createAt:
  message: '抓取时间'

capture.field.content:
  message: '正文'

capture.empty.restricted.heading:
  message: '无法抓取此页面'

capture.empty.restricted.body.before:
  message: 'Web2Chat 不能在浏览器内置页面上工作。请打开一个普通网页，然后再次点击'

capture.empty.restricted.body.icon:
  message: '工具栏图标'

capture.empty.restricted.body.after:
  message: '。'

capture.empty.noContent.heading:
  message: '没有可抓取的内容'

capture.empty.noContent.body.before:
  message: '此页面没有可识别的文章正文。换一个页面，再次点击'

capture.empty.noContent.body.icon:
  message: '工具栏图标'

capture.empty.noContent.body.after:
  message: '。'

capture.error.scriptFailed.heading:
  message: '抓取失败'

capture.error.scriptFailed.body.before:
  message: '读取此页面时出错。请点击'

capture.error.scriptFailed.body.icon:
  message: '工具栏图标'

capture.error.scriptFailed.body.after:
  message: '重试。'
